<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Email | Ana Leah Basco</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Standalone Design System */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1C2D27 0%, #1C2D27 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #79ac9b;
            -webkit-font-smoothing: antialiased;
        }

        .portal-wrapper {
            background-color: #e7ffee;
            max-width: 550px;
            width: 100%;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(16, 42, 67, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Decorative Top Accent Line */
        .portal-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background:#1C2D27;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #82b196;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 40px;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .nav-back:hover {
            color: #042c27;
            transform: translateX(-4px);
        }

        .header-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: #1C2D27;
        }

        .header-section p {
            font-size: 0.95rem;
            color: #043524;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .email-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .custom-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e3e8ee;
            background-color: #f8fbfa;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            color: #102a43;
            transition: all 0.3s ease;
            outline: none;
        }

        .custom-input::placeholder {
            color: #9fb3c8;
        }

        .custom-input:focus {
            background-color: #d5f3e0;
            border-color: #1C2D27;
            box-shadow: 0 4px 12px rgba(16, 42, 67, 0.05);
        }

        textarea.custom-input {
            resize: vertical;
            min-height: 140px;
        }

        .submit-btn {
            margin-top: 10px;
            padding: 16px 30px;
            background-color: #003825;
            color: #ffffff;
            border: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: #1C2D27;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(16, 42, 67, 0.15);
        }

        /* Success Message Styling */
        .success-state {
            display: none;
            text-align: center;
            padding: 20px 0;
            animation: fadeIn 0.5s ease forwards;
        }

        .success-icon {
            font-size: 4rem;
            color: #1C2D27;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="portal-wrapper">

        <a href="index.html" class="nav-back">
            <i class="fa-solid fa-arrow-left"></i> Return to Portfolio
        </a>

        <div id="form-container">
            <div class="header-section">
                <h1>Direct Message</h1>
                <p>Skip the email app. Fill out the secure form below and your message will be routed directly to my
                    inbox.</p>
            </div>

            <form id="email-form" class="email-form">

                <div class="input-group">
                    <input type="text" name="name" placeholder="Full Name" required class="custom-input">
                </div>

                <div class="input-group">
                    <input type="email" name="_replyto" placeholder="Email Address" required class="custom-input">
                </div>

                <div class="input-group">
                    <input type="text" name="subject" placeholder="Subject" class="custom-input">
                </div>

                <div class="input-group">
                    <textarea name="message" placeholder="Type your message here..." required
                        class="custom-input"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">
                    Send Message <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>

        <div id="success-container" class="success-state">
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h1 style="font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 10px;">Message Sent!
            </h1>
            <p style="color: #629881; line-height: 1.6; margin-bottom: 30px;">Thank you for reaching out. Your email was
                successfully transmitted directly to my inbox, and I will get back to you shortly.</p>
            <a href="index.html" class="submit-btn" style="text-decoration: none;">Return</a>
        </div>

    </div>

    <script>
        const form = document.getElementById("email-form");
        const formContainer = document.getElementById("form-container");
        const successContainer = document.getElementById("success-container");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async (event) => {

            event.preventDefault();

            submitBtn.innerHTML = 'Sending... <i class="fa-solid fa-spinner fa-spin"></i>';
            submitBtn.disabled = true;

            const formData = {
                name: form.name.value,
                email: form._replyto.value,
                subject: form.subject.value,
                message: form.message.value
            };

            try {

                const response = await fetch("/api/contact", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(formData)

                });

                const result = await response.json();

                if (result.success) {

                    formContainer.style.display = "none";
                    successContainer.style.display = "block";

                } else {

                    alert("Failed to send message.");

                    resetButton();

                }

            } catch (error) {

                console.error(error);

                alert("Server connection failed.");

                resetButton();

            }

        });

        function resetButton() {

            submitBtn.innerHTML = 'Send Message <i class="fa-solid fa-paper-plane"></i>';
            submitBtn.disabled = false;

        }
    </script>

</body>

</html>
